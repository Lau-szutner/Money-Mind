openapi: 3.0.0
info:
  title: API de MoneyMind
  description: API para manejo de MoneyMind.
  version: 1.0.0

servers:
  - url: http://localhost:4000
    description: Servidor de desarrollo

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id_users:
          type: integer
          example: 1
        name:
          type: string
          example: 'Juan Perez'
        email:
          type: string
          format: email
          example: 'juan@example.com'
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
    Transaction:
      type: object
      required:
        - title
        - category
        - date
        - type
        - amount
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        title:
          type: string
          maxLength: 150
          example: 'Supermercado'
        description:
          type: string
          maxLength: 400
          nullable: true
          example: 'Compras para la cena'
        category:
          type: string
          maxLength: 100
          example: 'Alimentos'
        photo:
          type: string
          maxLength: 255
          nullable: true
          example: 'https://bucket.com/foto.jpg'
        date:
          type: string
          format: date-time
          example: '2026-04-23T12:00:00Z'
        type:
          type: string
          enum: [income, expense]
          example: 'expense'
        amount:
          type: number
          format: double
          example: 1500.50
        fk_user_id:
          type: integer
          readOnly: true
          example: 5
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    Post:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 10
        title:
          type: string
          maxLength: 300
          example: 'Estrategias de inversión en CEDEARs'
        slug:
          type: string
          readOnly: true
          example: 'estrategias-de-inversion-en-cedears-1714723200'
        body:
          type: string
          nullable: true
          example: 'Un resumen de los mejores activos para este mes.'
        post_type:
          type: string
          enum: [text, link, image, video]
          default: text
        url:
          type: string
          format: uri
          nullable: true
          example: 'https://youtube.com/watch?v=ejemplo'
        vote_score:
          type: integer
          readOnly: true
          example: 42
        comment_count:
          type: integer
          readOnly: true
          example: 5
        fk_user_id:
          type: integer
          readOnly: true
          example: 3
        fk_community_id:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        User:
          $ref: '#/components/schemas/User'
        Community:
          $ref: '#/components/schemas/Community'

    PostCreate:
      type: object
      required:
        - title
        - fk_community_id
      properties:
        title:
          type: string
          maxLength: 300
        body:
          type: string
        post_type:
          type: string
          enum: [text, link, image, video]
        url:
          type: string
        fk_community_id:
          type: integer

    PostUpdate:
      type: object
      properties:
        title:
          type: string
        body:
          type: string
    Course:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 5
        title:
          type: string
          maxLength: 100
          example: 'Gestión del presupuesto personal'
        author:
          type: string
          maxLength: 100
          example: 'María López'
        description:
          type: string
          example: 'Curso práctico de administración de dinero para principiantes.'
        price:
          type: number
          format: double
          example: 49.99
        created_at:
          type: string
          format: date-time
          readOnly: true
          example: '2026-04-23T12:00:00Z'
        updated_at:
          type: string
          format: date-time
          readOnly: true
          example: '2026-04-23T12:00:00Z'
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 2
        title:
          type: string
          maxLength: 100
          example: 'Alimentos'
        fk_user_id:
          type: integer
          readOnly: true
          example: 3
        created_at:
          type: string
          format: date-time
          readOnly: true
          example: '2026-04-23T12:00:00Z'
        updated_at:
          type: string
          format: date-time
          readOnly: true
          example: '2026-04-23T12:00:00Z'
    Community:
      type: object
      required:
        - name
        - owner_id
        - is_private
      properties:
        id:
          type: integer
          format: int64
          description: 'ID autoincremental único de la comunidad'
          readOnly: true
        name:
          type: string
          maxLength: 255
          description: 'Nombre único de la comunidad'
        slug:
          type: string
          maxLength: 255
          description: 'URL amigable única basada en el nombre'
        description:
          type: string
          nullable: true
          description: 'Descripción detallada del propósito de la comunidad'
        image_url:
          type: string
          maxLength: 500
          nullable: true
          format: uri
          description: 'URL de la imagen de perfil o logo'
        owner_id:
          type: integer
          description: 'ID del usuario creador (Relación con tabla users)'
        is_private:
          type: boolean
          default: false
          description: 'Define si la comunidad es privada o pública'
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
      example:
        id: 1
        name: 'Desarrolladores React'
        slug: 'desarrolladores-react'
        description: 'Espacio para compartir conocimiento sobre React y Next.js'
        image_url: 'https://ejemplo.com/icon.png'
        owner_id: 42
        is_private: false
        createdAt: '2024-03-20T15:30:00Z'
        updatedAt: '2024-03-20T15:30:00Z'

    CommunityCreate:
      type: object
      required:
        - name
        - is_private
      properties:
        name:
          type: string
          maxLength: 255
          description: 'Nombre único de la comunidad'
        slug:
          type: string
          maxLength: 255
          description: 'URL amigable única basada en el nombre'
        description:
          type: string
          nullable: true
          description: 'Descripción detallada del propósito de la comunidad'
        image_url:
          type: string
          maxLength: 500
          nullable: true
          format: uri
          description: 'URL de la imagen de perfil o logo'
        is_private:
          type: boolean
          default: false
          description: 'Define si la comunidad es privada o pública'

    CommunityUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 255
        description:
          type: string
        image_url:
          type: string
          maxLength: 500
          format: uri
        is_private:
          type: boolean

    UserCommunity:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user_id:
          type: integer
        community_id:
          type: integer
        role:
          type: string
          enum: [admin, moderator, member]
        status:
          type: string
          enum: [active, pending, banned]
        joined_at:
          type: string
          format: date-time
          readOnly: true
        User:
          $ref: '#/components/schemas/User'

paths:
  /auth/:
    post:
      summary: Crear un nuevo usuario
      tags:
        - Usuarios
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: Usuario creado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  userId:
                    type: integer
        '400':
          description: Datos inválidos o correo ya registrado
        '500':
          description: Error interno del servidor

    get:
      summary: Obtener todos los usuarios
      tags:
        - Usuarios
      responses:
        '200':
          description: Lista de usuarios obtenida con éxito
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '404':
          description: No se encontraron usuarios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/{id}:
    get:
      summary: Obtener un usuario por ID
      tags:
        - Usuarios
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Usuario no encontrado
        '500':
          description: Error del servidor

  /auth/login:
    post:
      summary: Iniciar sesión
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  token:
                    type: string
        '401':
          description: Credenciales incorrectas (User not found / Incorrect password)
        '400':
          description: Faltan campos requeridos

  /transactions:
    post:
      summary: Crear una nueva transacción
      tags: [Transactions]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Transaction'
      responses:
        201:
          description: Transacción creada.
        400:
          description: Faltan campos requeridos.
        500:
          description: Error interno.

    get:
      summary: Obtener todas las transacciones (Público)
      tags: [Transactions]
      responses:
        200:
          description: Lista de todas las transacciones.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'
        404:
          description: No se encontraron transacciones.

  /transactions/complete:
    get:
      summary: Obtener transacciones del usuario autenticado
      tags: [Transactions]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Lista de transacciones del usuario.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'
        404:
          description: No se encontraron transacciones para este usuario.

  /transactions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID de la transacción
    get:
      summary: Obtener una transacción específica por ID
      tags: [Transactions]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Datos de la transacción encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        404:
          description: Transacción no encontrada.

    put:
      summary: Actualizar una transacción existente
      tags: [Transactions]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Transaction'
      responses:
        200:
          description: Transacción actualizada correctamente.
        404:
          description: No encontrada o no pertenece al usuario.

    delete:
      summary: Eliminar una transacción
      tags: [Transactions]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Transacción eliminada.
        404:
          description: No encontrada.

  /transactions/filter-by-month:
    get:
      summary: Filtrar transacciones por mes y año
      tags: [Transactions]
      security:
        - bearerAuth: []
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
          example: 2026
        - name: month
          in: query
          required: true
          schema:
            type: integer
          example: 4
      responses:
        200:
          description: Transacciones encontradas en el periodo.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'
        400:
          description: Faltan parámetros de consulta.

  /posts:
    get:
      summary: Obtener todos los posts (Global)
      tags: [Posts]
      responses:
        200:
          description: Lista de todos los posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
    post:
      summary: Crear un post en una comunidad
      tags: [Posts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCreate'
      responses:
        201:
          description: Post creado correctamente
        400:
          description: Faltan campos (Título o Community ID)

  /posts/feed:
    get:
      summary: Obtener feed personalizado (Comunidades seguidas)
      tags: [Posts]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Lista de posts de tus comunidades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
        401:
          description: No autorizado

  /posts/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
        description: Slug amigable del post
    get:
      summary: Obtener un post por su Slug
      tags: [Posts]
      responses:
        200:
          description: Detalle del post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        404:
          description: Post no encontrado

  /posts/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID numérico para acciones de edición/borrado
    put:
      summary: Actualizar un post (Solo autor)
      tags: [Posts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostUpdate'
      responses:
        200:
          description: Post actualizado
    delete:
      summary: Eliminar un post
      tags: [Posts]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Post eliminado (soft delete)

  /courses:
    get:
      summary: Obtener todos los cursos
      tags: [Courses]
      responses:
        200:
          description: Lista de cursos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'
        500:
          description: Error interno del servidor

  /courses/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID del curso
    get:
      summary: Obtener un curso por ID
      tags: [Courses]
      responses:
        200:
          description: Curso encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        404:
          description: Curso no encontrado
        500:
          description: Error interno del servidor

  /categories:
    get:
      summary: Obtener todas las categorías del usuario autenticado
      tags: [Categories]
      responses:
        200:
          description: Lista de categorías
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
        400:
          description: No se proporcionó el usuario autenticado
        401:
          description: No autorizado
        404:
          description: No se encontraron categorías para este usuario
        500:
          description: Error interno del servidor

  /communities:
    get:
      summary: Obtener todas las comunidades
      tags: [Community]
      responses:
        200:
          description: Comunidades obtenidas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Community'
        500:
          description: Error interno del servidor

    post:
      summary: Crear una nueva comunidad
      tags: [Community]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommunityCreate'
      responses:
        201:
          description: Comunidad creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Community'
        400:
          description: Datos inválidos
        500:
          description: Error interno del servidor

  /communities/byUser:
    get:
      summary: Obtener comunidades del usuario autenticado
      tags: [Community]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Lista de comunidades del usuario
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    UserCommunity:
                      $ref: '#/components/schemas/UserCommunity'
                    Community:
                      $ref: '#/components/schemas/Community'
        404:
          description: No se encontraron comunidades para este usuario
        500:
          description: Error interno del servidor

  /communities/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID de la comunidad
    get:
      summary: Obtener detalles de una comunidad por ID
      tags: [Community]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Detalles de la comunidad
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Community'
        403:
          description: Acceso denegado a comunidad privada
        404:
          description: Comunidad no encontrada
        500:
          description: Error interno del servidor

    put:
      summary: Actualizar una comunidad (solo owner o admin)
      tags: [Community]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommunityUpdate'
      responses:
        200:
          description: Comunidad actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Community'
        403:
          description: No tienes permisos para editar
        404:
          description: Comunidad no encontrada
        500:
          description: Error interno del servidor

    delete:
      summary: Eliminar una comunidad (solo owner)
      tags: [Community]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Comunidad eliminada
        403:
          description: Solo el propietario puede eliminar
        404:
          description: Comunidad no encontrada
        500:
          description: Error interno del servidor

  /communities/{id}/join:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID de la comunidad
    post:
      summary: Unirse a una comunidad
      tags: [Community]
      security:
        - bearerAuth: []
      responses:
        201:
          description: Solicitud enviada
        400:
          description: Ya eres miembro
        404:
          description: Comunidad no encontrada
        500:
          description: Error interno del servidor

  /communities/{id}/leave:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID de la comunidad
    delete:
      summary: Salir de una comunidad
      tags: [Community]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Has salido de la comunidad
        404:
          description: No eres miembro o comunidad no encontrada
        500:
          description: Error interno del servidor

  /communities/{id}/members:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID de la comunidad
    get:
      summary: Obtener miembros de una comunidad
      tags: [Community]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Lista de miembros
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserCommunity'
        403:
          description: Acceso denegado
        404:
          description: Comunidad no encontrada
        500:
          description: Error interno del servidor
