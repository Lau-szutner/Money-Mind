openapi: 3.0.0
info:
  title: API de MoneyMind
  description: API para manejo de MoneyMind.
  version: 1.0.0

servers:
  - url: http://localhost:4000
    description: Servidor de desarrollo

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id_users:
          type: integer
          example: 1
        name:
          type: string
          example: 'Juan Perez'
        email:
          type: string
          format: email
          example: 'juan@example.com'
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
    Transaction:
      type: object
      required:
        - title
        - category
        - date
        - type
        - amount
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        title:
          type: string
          maxLength: 150
          example: 'Supermercado'
        description:
          type: string
          maxLength: 400
          nullable: true
          example: 'Compras para la cena'
        category:
          type: string
          maxLength: 100
          example: 'Alimentos'
        photo:
          type: string
          maxLength: 255
          nullable: true
          example: 'https://bucket.com/foto.jpg'
        date:
          type: string
          format: date-time
          example: '2026-04-23T12:00:00Z'
        type:
          type: string
          enum: [income, expense]
          example: 'expense'
        amount:
          type: number
          format: double
          example: 1500.50
        fk_user_id:
          type: integer
          readOnly: true
          example: 5
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    Post:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 10
        title:
          type: string
          maxLength: 255
          example: 'Cómo ahorrar en el supermercado'
        body:
          type: string
          example: 'Consejos para reducir gastos semanales en comida.'
        fk_user_id:
          type: integer
          readOnly: true
          example: 3
        created_at:
          type: string
          format: date-time
          readOnly: true
          example: '2026-04-23T12:00:00Z'
        updated_at:
          type: string
          format: date-time
          readOnly: true
          example: '2026-04-23T12:00:00Z'
        User:
          $ref: '#/components/schemas/User'
    PostCreate:
      type: object
      required:
        - title
        - body
      properties:
        title:
          type: string
          maxLength: 255
          example: 'Nuevo post sobre finanzas'
        body:
          type: string
          example: 'Contenido del post con consejos y experiencias.'
    PostUpdate:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
          example: 'Titulo actualizado'
        body:
          type: string
          example: 'Contenido actualizado del post.'
    Course:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 5
        title:
          type: string
          maxLength: 100
          example: 'Gestión del presupuesto personal'
        author:
          type: string
          maxLength: 100
          example: 'María López'
        description:
          type: string
          example: 'Curso práctico de administración de dinero para principiantes.'
        price:
          type: number
          format: double
          example: 49.99
        created_at:
          type: string
          format: date-time
          readOnly: true
          example: '2026-04-23T12:00:00Z'
        updated_at:
          type: string
          format: date-time
          readOnly: true
          example: '2026-04-23T12:00:00Z'
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 2
        title:
          type: string
          maxLength: 100
          example: 'Alimentos'
        fk_user_id:
          type: integer
          readOnly: true
          example: 3
        created_at:
          type: string
          format: date-time
          readOnly: true
          example: '2026-04-23T12:00:00Z'
        updated_at:
          type: string
          format: date-time
          readOnly: true
          example: '2026-04-23T12:00:00Z'
paths:
  /auth/:
    post:
      summary: Crear un nuevo usuario
      tags:
        - Usuarios
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: Usuario creado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  userId:
                    type: integer
        '400':
          description: Datos inválidos o correo ya registrado
        '500':
          description: Error interno del servidor

    get:
      summary: Obtener todos los usuarios
      tags:
        - Usuarios
      responses:
        '200':
          description: Lista de usuarios obtenida con éxito
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '404':
          description: No se encontraron usuarios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/{id}:
    get:
      summary: Obtener un usuario por ID
      tags:
        - Usuarios
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Usuario no encontrado
        '500':
          description: Error del servidor

  /auth/login:
    post:
      summary: Iniciar sesión
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  token:
                    type: string
        '401':
          description: Credenciales incorrectas (User not found / Incorrect password)
        '400':
          description: Faltan campos requeridos

  /transactions:
    post:
      summary: Crear una nueva transacción
      tags: [Transactions]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Transaction'
      responses:
        201:
          description: Transacción creada.
        400:
          description: Faltan campos requeridos.
        500:
          description: Error interno.

    get:
      summary: Obtener todas las transacciones (Público)
      tags: [Transactions]
      responses:
        200:
          description: Lista de todas las transacciones.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'
        404:
          description: No se encontraron transacciones.

  /transactions/complete:
    get:
      summary: Obtener transacciones del usuario autenticado
      tags: [Transactions]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Lista de transacciones del usuario.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'
        404:
          description: No se encontraron transacciones para este usuario.

  /transactions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID de la transacción
    get:
      summary: Obtener una transacción específica por ID
      tags: [Transactions]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Datos de la transacción encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        404:
          description: Transacción no encontrada.

    put:
      summary: Actualizar una transacción existente
      tags: [Transactions]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Transaction'
      responses:
        200:
          description: Transacción actualizada correctamente.
        404:
          description: No encontrada o no pertenece al usuario.

    delete:
      summary: Eliminar una transacción
      tags: [Transactions]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Transacción eliminada.
        404:
          description: No encontrada.

  /transactions/filter-by-month:
    get:
      summary: Filtrar transacciones por mes y año
      tags: [Transactions]
      security:
        - bearerAuth: []
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
          example: 2026
        - name: month
          in: query
          required: true
          schema:
            type: integer
          example: 4
      responses:
        200:
          description: Transacciones encontradas en el periodo.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'
        400:
          description: Faltan parámetros de consulta.

  /posts:
    get:
      summary: Obtener todos los posts
      tags: [Posts]
      responses:
        200:
          description: Lista de posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
        500:
          description: Error interno del servidor
    post:
      summary: Crear un post
      tags: [Posts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCreate'
      responses:
        201:
          description: Post creado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  postId:
                    type: integer
        400:
          description: Faltan campos requeridos
        401:
          description: No autorizado
        500:
          description: Error interno del servidor

  /posts/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID del post
    get:
      summary: Obtener un post por ID
      tags: [Posts]
      responses:
        200:
          description: Post encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        404:
          description: Post no encontrado
        500:
          description: Error interno del servidor
    put:
      summary: Actualizar un post
      tags: [Posts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostUpdate'
      responses:
        200:
          description: Post actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        400:
          description: Faltan campos válidos
        401:
          description: No autorizado
        404:
          description: Post no encontrado
        500:
          description: Error interno del servidor
    delete:
      summary: Eliminar un post
      tags: [Posts]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Post eliminado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        401:
          description: No autorizado
        404:
          description: Post no encontrado
        500:
          description: Error interno del servidor

  /courses:
    get:
      summary: Obtener todos los cursos
      tags: [Courses]
      responses:
        200:
          description: Lista de cursos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'
        500:
          description: Error interno del servidor

  /courses/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID del curso
    get:
      summary: Obtener un curso por ID
      tags: [Courses]
      responses:
        200:
          description: Curso encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        404:
          description: Curso no encontrado
        500:
          description: Error interno del servidor

  /categories:
    get:
      summary: Obtener todas las categorías del usuario autenticado
      tags: [Categories]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Lista de categorías
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
        400:
          description: No se proporcionó el usuario autenticado
        401:
          description: No autorizado
        404:
          description: No se encontraron categorías para este usuario
        500:
          description: Error interno del servidor
